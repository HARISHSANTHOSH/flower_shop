cat > ~/Projects/flower_shop/flowerproject/railway.toml << 'EOF'
[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --noinput"

[deploy]
startCommand = "python manage.py migrate && gunicorn flowerproject.wsgi:application --bind 0.0.0.0:$PORT"
EOF