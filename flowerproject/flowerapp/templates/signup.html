<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — Bloom Heaven</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --forest:  #0a2416;
    --leaf:    #1e5c38;
    --sage:    #3a8f5c;
    --mint:    #5dba80;
    --cream:   #faf7f2;
    --warm:    #f0ebe0;
    --gold:    #b8892e;
    --border:  #e2ddd5;
    --muted:   #8a7f70;
    --text:    #1a1008;
}

html, body {
    min-height: 100%;
    background: #f5f3ef;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
}

body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 16px;
}

/* ── Top brand bar ── */
.top-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
    text-decoration: none;
}

.top-brand .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, rgba(30,92,56,.1), rgba(184,137,46,.1));
    border: 1.5px solid rgba(30,92,56,.18);
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
}

.top-brand .name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--forest);
    letter-spacing: -.2px;
}

.top-brand .name em {
    font-style: italic;
    color: var(--gold);
}

/* ── Card ── */
.card {
    background: #fff;
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 32px rgba(10,36,22,.07), 0 1px 4px rgba(0,0,0,.04);
    width: 100%;
    max-width: 440px;
    padding: 40px 40px 36px;
}

/* ── Card header ── */
.card-header {
    margin-bottom: 28px;
}

.card-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--forest);
    letter-spacing: -.3px;
    margin-bottom: 6px;
}

.card-header h1 em {
    font-style: italic;
    color: var(--sage);
}

.card-header p {
    font-size: 13.5px;
    color: var(--muted);
}

.card-header p a {
    color: var(--leaf);
    text-decoration: none;
    font-weight: 500;
}

.card-header p a:hover { text-decoration: underline; }

/* ── Form fields ── */
.field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.field {
    margin-bottom: 14px;
}

.field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
}

.field input {
    width: 100%;
    padding: 11px 14px;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color .2s, box-shadow .2s, background .2s;
}

.field input::placeholder { color: #c5bfb6; }

.field input:focus {
    border-color: var(--leaf);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(30,92,56,.08);
}

.field input.input-error {
    border-color: #c0392b;
    box-shadow: 0 0 0 3px rgba(192,57,43,.07);
}

/* ── Password strength ── */
.strength-wrap { margin-top: 7px; }

.strength-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 4px;
}

.strength-bar span {
    flex: 1;
    height: 3px;
    border-radius: 99px;
    background: #e8e2d8;
    transition: background .3s;
}

.strength-bar span.weak   { background: #e05c5c; }
.strength-bar span.medium { background: var(--gold); }
.strength-bar span.strong { background: var(--mint); }

.strength-label {
    font-size: 11px;
    color: var(--muted);
}

/* ── Submit button ── */
.submit-btn {
    width: 100%;
    padding: 13px;
    background: var(--forest);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: .02em;
    transition: background .2s, transform .15s, box-shadow .2s;
    margin-top: 4px;
}

.submit-btn:hover {
    background: var(--leaf);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(10,36,22,.2);
}

.submit-btn:active { transform: translateY(0); }

.submit-btn:disabled {
    opacity: .6;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

/* ── Divider ── */
.divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 18px 0;
    color: #c5bfb6;
    font-size: 11.5px;
}

.divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
}

/* ── Google button ── */
.google-btn {
    width: 100%;
    padding: 12px 16px;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: border-color .2s, box-shadow .2s, background .2s;
}

.google-btn:hover {
    background: var(--cream);
    border-color: #c8c0b4;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
}

.google-btn img { width: 18px; height: 18px; }

/* ── Terms ── */
.terms {
    font-size: 11.5px;
    color: #b0a898;
    text-align: center;
    margin-top: 16px;
    line-height: 1.6;
}

.terms a { color: var(--leaf); text-decoration: none; }
.terms a:hover { text-decoration: underline; }

/* ── Perks strip ── */
.perks {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 24px;
    flex-wrap: wrap;
}

.perk {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
}

.perk .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--mint);
    flex-shrink: 0;
}

/* ── Toast ── */
#toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--forest);
    color: #fff;
    padding: 11px 22px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    opacity: 0;
    pointer-events: none;
    transition: all .3s cubic-bezier(.16,1,.3,1);
    z-index: 999;
    white-space: nowrap;
    border: 1px solid rgba(93,186,128,.2);
    box-shadow: 0 8px 28px rgba(0,0,0,.2);
}

#toast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.error   { background: #5c1a1a; border-color: rgba(192,57,43,.3); }
#toast.success { background: var(--leaf); border-color: rgba(93,186,128,.3); }

/* ══════════════════════
   MOBILE
══════════════════════ */
@media (max-width: 480px) {
    body { padding: 20px 0; justify-content: flex-start; }

    .top-brand { margin-bottom: 20px; }

    .card {
        border-radius: 20px 20px 0 0;
        border-left: none;
        border-right: none;
        border-bottom: none;
        box-shadow: 0 -4px 24px rgba(0,0,0,.06);
        padding: 28px 22px 40px;
        max-width: 100%;
        min-height: calc(100vh - 120px);
    }

    .card-header { margin-bottom: 22px; }
    .card-header h1 { font-size: 23px; }

    .field-row { grid-template-columns: 1fr; gap: 0; }

    .field input { font-size: 16px; } /* prevent iOS zoom */

    .perks { gap: 12px; margin-top: 20px; }
    .perk  { font-size: 11px; }
}

@media (max-width: 360px) {
    .card { padding: 22px 16px 36px; }
    .card-header h1 { font-size: 20px; }
}

@supports (padding-bottom: env(safe-area-inset-bottom)) {
    @media (max-width: 480px) {
        .card { padding-bottom: calc(40px + env(safe-area-inset-bottom)); }
        #toast { bottom: calc(20px + env(safe-area-inset-bottom)); }
    }
}
</style>
</head>
<body>

<!-- Brand -->
<a class="top-brand" href="/flowerapp/flowers/">
    <div class="logo">🌿</div>
    <div class="name">Bloom <em>Heaven</em></div>
</a>

<!-- Card -->
<div class="card">
    <div class="card-header">
        <h1>Create your <em>account</em></h1>
        <p>Already have one? <a href="/flowerapp/login/">Sign in instead</a></p>
    </div>

    <form id="signupForm">
        <div class="field-row">
            <div class="field">
                <label>Username</label>
                <input id="username" type="text" placeholder="username" required autocomplete="username">
            </div>
            <div class="field">
                <label>Email</label>
                <input id="email" type="email" placeholder="emailaddress" required autocomplete="email">
            </div>
        </div>

        <div class="field">
            <label>Password</label>
            <input id="password" type="password" placeholder="Create a strong password" required autocomplete="new-password">
            <div class="strength-wrap">
                <div class="strength-bar">
                    <span id="s1"></span><span id="s2"></span>
                    <span id="s3"></span><span id="s4"></span>
                </div>
                <div class="strength-label" id="strengthLabel"></div>
            </div>
        </div>

        <div class="field">
            <label>Confirm Password</label>
            <input id="password2" type="password" placeholder="Repeat your password" required autocomplete="new-password">
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Create Account</button>
    </form>

    <!-- Google sign-in — disabled until custom domain is ready -->

        Continue with Google
    </button>
    -->

    <p class="terms">
        By creating an account you agree to our
        <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
    </p>
</div>

<!-- Perks below card -->
<div class="perks">
    <div class="perk"><div class="dot"></div>Free account</div>
    <div class="perk"><div class="dot"></div>Track orders</div>
    <div class="perk"><div class="dot"></div>Exclusive deals</div>
    <div class="perk"><div class="dot"></div>Free delivery</div>
</div>

<div id="toast"></div>

    /* ── Password strength ── */
    document.getElementById('password').addEventListener('input', function() {
        const val   = this.value;
        const bars  = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
        const label = document.getElementById('strengthLabel');

        bars.forEach(b => { b.className = ''; });

        let score = 0;
        if (val.length >= 6)  score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const cls    = ['','weak','weak','medium','strong'];
        const labels = ['','Weak','Fair','Strong','Very strong'];
        const colors = ['','#e05c5c','#e05c5c',  '#b8892e','#3a8f5c'];

        for (let i = 0; i < score; i++) bars[i].className = cls[score];
        label.textContent  = val.length ? labels[score] : '';
        label.style.color  = colors[score];
    });

    /* ── Signup form ── */
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const username  = document.getElementById('username').value.trim();
        const email     = document.getElementById('email').value.trim();
        const password  = document.getElementById('password').value;
        const password2 = document.getElementById('password2').value;
        const p2Input   = document.getElementById('password2');
        const submitBtn = document.getElementById('submitBtn');

        if (password !== password2) {
            p2Input.classList.add('input-error');
            showToast('Passwords do not match!', 'error');
            return;
        }
        p2Input.classList.remove('input-error');

        submitBtn.disabled    = true;
        submitBtn.textContent = 'Creating account…';

        try {
            const res  = await fetch(`${API_BASE}/api/v1/signup/`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ username, email, password, password2 })
            });
            const data = await res.json();

            if (!res.ok) {
                const msg = data.username || data.email || data.password || 'Signup failed';
                showToast(Array.isArray(msg) ? msg[0] : msg, 'error');
                return;
            }

            localStorage.setItem('access_token',  data.access);
            localStorage.setItem('refresh_token', data.refresh);

            showToast(`Welcome, ${data.user.username}! 🌿`, 'success');
            setTimeout(() => { window.location.href = `${API_BASE}/flowers/`; }, 1500);

        } catch (err) {
            showToast('Signup failed. Please try again.', 'error');
        } finally {
            submitBtn.disabled    = false;
            submitBtn.textContent = 'Create Account';
        }
    });

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className   = `show ${type}`;
        setTimeout(() => { toast.className = ''; }, 3500);
    }
